name: validation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: astral-sh/setup-uv@v6
      - run: uv sync --locked
      - run: uv run pytest
      - run: corepack enable
      - run: pnpm --dir apps/web install --frozen-lockfile
      - run: pnpm --dir apps/web check
      - run: pnpm --dir apps/web build
      - run: git diff --check
